name: CI (Backend)

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/*-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/*-backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.mod

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
