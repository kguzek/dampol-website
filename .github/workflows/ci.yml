name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/composite-actions/install

      - name: Format check
        run: npm run format:check
        if: always()

      - name: Typecheck
        run: npm run types:check
        if: always()

      - name: Build Angular app
        run: npm run build
        if: always()
