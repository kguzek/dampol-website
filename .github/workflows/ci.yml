name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check
        if: always()

      - name: Typecheck
        run: npm run types:check
        if: always()

      - name: Build Angular app
        run: npm run build
        if: always()
