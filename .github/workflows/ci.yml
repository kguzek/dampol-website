name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "npm"
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check
        if: always()

      - name: Typecheck
        run: npm run types:check
        if: always()
